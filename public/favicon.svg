<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Background — dark ground matching brand pill -->
  <rect width="100" height="100" rx="22" fill="#0B0F1A"/>
  <!-- Subtle gold border for definition at small render sizes -->
  <rect width="100" height="100" rx="22" fill="none" stroke="rgba(240,165,0,0.22)" stroke-width="1.5"/>
  <!-- Serif "O" initial — centred vertically and horizontally -->
  <text x="50" y="50" text-anchor="middle" dominant-baseline="central"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="66" font-weight="700" fill="#ffffff">O</text>
</svg>
