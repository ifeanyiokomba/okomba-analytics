<svg xmlns="http://www.w3.org/2000/svg" viewBox="190 50 420 128" fill="none">
  <!-- Pill background — dark ground matching brand identity -->
  <rect x="195" y="55" width="410" height="118" rx="22" fill="#0B0F1A"/>
  <rect x="195" y="55" width="410" height="118" rx="22" fill="none" stroke="rgba(240,165,0,0.18)" stroke-width="1"/>
  <!-- "Okomba" — Georgia serif, bold, white -->
  <text x="400" y="135" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', Times, serif"
    font-size="96" font-weight="700" fill="#FFFFFF" letter-spacing="-1">Okomba</text>
  <!-- "Analytics" — Georgia serif, italic, brand gold -->
  <text x="585" y="162" text-anchor="end"
    font-family="Georgia, 'Times New Roman', Times, serif"
    font-size="22" font-style="italic" fill="#F0A500">Analytics</text>
</svg>
